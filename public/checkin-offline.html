<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · RegisterDesk Check-in</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff; color: #0f172a; padding: 24px;
    }
    .card { max-width: 420px; text-align: center; }
    .badge {
      width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 18px; display: flex;
      align-items: center; justify-content: center; color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 6px 20px rgba(99,102,241,.25);
    }
    h1 { font-size: 19px; font-weight: 700; margin: 0 0 8px; letter-spacing: -.01em; }
    p { font-size: 14px; line-height: 1.55; color: #475569; margin: 0 0 20px; }
    button {
      border: 0; cursor: pointer; font-size: 14px; font-weight: 600; color: #fff;
      padding: 11px 20px; border-radius: 10px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }
    .hint { margin-top: 16px; font-size: 12.5px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>The check-in page hasn't been cached on this device yet. Reconnect to the internet and open it once — after that, scanning will keep working even without a connection.</p>
    <button onclick="location.reload()">Try again</button>
    <p class="hint">Already-cached attendees and queued check-ins are saved locally and will sync automatically.</p>
  </div>
</body>
</html>
